*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1e1e2a;--tx:#f0f0ff;--t2:#b0b0cc;--t3:#606080;--bd:#2a2a3a;--bl:#4f8eff;--gr:#22c55e;--rd:#ef4444;--am:#f59e0b;--pu:#8b5cf6;--gd:linear-gradient(135deg,#4f8eff,#8b5cf6)}

body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#sidebar{display:none}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.hdr{padding:12px 16px 8px;flex-shrink:0;border-bottom:1px solid var(--bd);background:var(--bg)}
.hd{font-size:8px;letter-spacing:3px;color:var(--bl);font-weight:700;text-transform:uppercase}
.hn{font-size:22px;font-weight:800;line-height:1.1;margin:2px 0}
.hn span{color:var(--bl)}
.hs{font-size:10px;color:var(--t3)}
.pt{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.pbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;flex:1;margin-right:8px}
.pfill{height:100%;background:var(--gd);border-radius:2px;transition:width .4s}
.pct{font-size:10px;color:var(--bl);font-weight:700;min-width:28px;text-align:right}
.hbtns{display:flex;gap:6px}
.hbtn{width:32px;height:32px;border-radius:10px;background:var(--bg3);border:1px solid var(--bd);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
#srchbar{display:none;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--bd)}
#srchi{width:100%;padding:8px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-size:14px;font-family:inherit}
#srchres{margin-top:6px}
.scr{flex:1;overflow-y:auto;padding:14px 14px 90px;-webkit-overflow-scrolling:touch}
.nav{background:var(--bg2);border-top:1px solid var(--bd);display:flex;flex-shrink:0;padding:4px 0 max(8px,env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:none;cursor:pointer;font-family:inherit}
.nb .ni{font-size:20px;line-height:1}
.nb .nl{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:.3px;text-transform:uppercase}
.nb.on .nl{color:var(--bl)}
.nb.on .ni{filter:drop-shadow(0 0 4px var(--bl))}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:14px;margin-bottom:10px}
.lbl{font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.inp{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:13px;font-family:inherit;resize:vertical;outline:none}
.inp:focus{border-color:var(--bl)}
textarea.inp{min-height:72px;line-height:1.6}
.btn{background:var(--gd);border:none;color:#fff;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.btnx{background:var(--bg3);border:1px solid var(--bd);color:var(--t2);padding:9px 16px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.lnkbtn{background:none;border:none;color:var(--bl);cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;padding:0}
.pill{padding:5px 13px;border-radius:18px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.pill.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.ci{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin-bottom:6px;cursor:pointer}
.ci.dn{opacity:.5;border-color:var(--gr)22}
.cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--bd);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gr);font-weight:700}
.ci.dn .cb{background:var(--gr)22;border-color:var(--gr)}
.ct{flex:1;font-size:13px;font-weight:600}
.ci.dn .ct{text-decoration:line-through;color:var(--t3)}
.tm{font-size:10px;color:var(--t3)}
.hg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.hc{padding:12px 8px;border-radius:14px;border:1.5px solid var(--bd);background:var(--bg2);text-align:center;cursor:pointer}
.hc.dn{border-color:var(--gr);background:var(--gr)11}
.wr{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--bd)}
.wd{width:14px;height:14px;border-radius:4px;background:var(--bg3)}
.wd.dn{background:var(--gr)}
.gb{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.gf{height:100%;background:var(--gd);border-radius:3px;transition:width .3s}
.gbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.stbanner{display:flex;gap:6px;margin-bottom:12px}
.stcard{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:10px;text-align:center}
.sb{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:10px;text-align:center}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gr);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#allovl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}

#novl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
#novl.show{display:flex}
#novl-inner{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px max(24px,env(safe-area-inset-bottom));width:100%;max-width:500px}

  body{flex-direction:row}
  #sidebar{display:flex;flex-direction:column;width:220px;background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0;z-index:10}
  .nav{display:none}
  #app{margin-left:0}
  .scr{padding-bottom:30px}

.slogo{padding:16px 14px 12px}
.slogot{font-size:16px;font-weight:800}
.slogot span{color:var(--bl)}
.spbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:6px}
.spf{height:100%;background:var(--gd);border-radius:2px;transition:width .4s}
.sday{font-size:9px;color:var(--t3);margin-top:4px}
.snav{padding:6px 8px;flex:1}
.snb{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:none;background:none;cursor:pointer;width:100%;text-align:left;font-family:inherit}
.snb.on{background:#4f8eff18}
.si{font-size:15px;width:20px;text-align:center}
.sl{font-size:12px;font-weight:600;color:var(--t2)}
.snb.on .sl{color:var(--bl)}
.sbot{padding:10px 12px;border-top:1px solid var(--bd)}
</style>
</head>

function sv(){try{localStorage.setItem(K,JSON.stringify(DB))}catch(e){}}
var DB=ld();

// ── THEME ────────────────────────────────────────────
var isDark=DB._dark!==false;
if(!isDark)document.body.classList.add("light");
function togTheme(){
  isDark=!isDark;DB._dark=isDark;sv();

  var ic=isDark?"🌙":"☀️";

}

// ── SOUND ────────────────────────────────────────────
var sndOn=DB._snd!==false,AC=null;
function gAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return AC}
function beep(t){
  if(!sndOn)return;var c=gAC();if(!c)return;
  try{
    var pl=function(freq,delay,dur){
      var o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.frequency.value=freq;
      g.gain.setValueAtTime(0.15,c.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+dur);
      o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur);
    };
    if(t==="done"){pl(523,0,.25);pl(659,.1,.25);pl(784,.2,.3)}
    else if(t==="win"){pl(523,0,.2);pl(659,.1,.2);pl(784,.2,.2);pl(1047,.3,.4)}
    else if(t==="habit"){pl(440,0,.15);pl(880,.15,.3)}
    else if(t==="pom"){pl(880,0,.2);pl(660,.15,.2);pl(440,.3,.3)}
    else{pl(700,0,.2)}
  }catch(e){}
}

function mkey(){var d=new Date();return d.getFullYear()+"-"+d.getMonth()}
function wd7(){
  var a=[],t=new Date();
  for(var i=6;i>=0;i--){var d=new Date(t);d.setDate(t.getDate()-i);a.push(d.toISOString().split("T")[0])}

}
function dltr(ds){return["Su","Mo","Tu","We","Th","Fr","Sa"][new Date(ds+"T12:00:00").getDay()]}

function eH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function dayN(){
  if(!DB._st){DB._st=tday();sv()}
  return Math.min(90,Math.max(1,Math.floor((new Date()-new Date(DB._st))/86400000)+1));

  ["m","d","n"].forEach(function(sec){
    var base=SCH[sec].map(function(it){
      var e=ud[it.id]||{};
      return{id:it.id,t:e.t!==undefined?e.t:it.t,l:e.l!==undefined?e.l:it.l,del:!!e.del};

    o+='<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700">🌙 Brain Dump</div><div data-k="bd" onclick="togMindEl(this)" style="width:22px;height:22px;border-radius:7px;background:'+(day.bd?"var(--pu)":"var(--bg3)")+';border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px">'+(day.bd?"✓":"")+'</div></div>';
    [{k:"bg",p:"Aaj kya sahi hua? ✅"},{k:"bi",p:"Kya improve? 📈"},{k:"bt",p:"Kya tension hai? 💭"}].forEach(function(f){
      o+='<textarea class="inp" style="margin-bottom:6px;min-height:52px" placeholder="'+f.p+'" data-k="'+f.k+'" onchange="saveMindDEl(this)">'+eH(day[f.k]||"")+'</textarea>';
    });
    o+='</div>';
    o+='<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700">🌬️ 4-4-6 Breathing</div><div data-k="br" onclick="togMindEl(this)" style="width:22px;height:22px;border-radius:7px;background:'+(day.br?"var(--pu)":"var(--bg3)")+';border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px">'+(day.br?"✓":"")+'</div></div>';
    o+='<div id="brui" style="text-align:center"><button class="btn" style="border-radius:18px;padding:11px 28px" onclick="startBr()">▶ Start</button></div></div>';
    o+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700">🎯 Priority</div><div data-k="pr" onclick="togMindEl(this)" style="width:22px;height:22px;border-radius:7px;background:'+(day.pr?"var(--pu)":"var(--bg3)")+';border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px">'+(day.pr?"✓":"")+'</div></div>';
    o+='<input class="inp" placeholder="Kal ki 1 priority..." value="'+eH(day.tm||"")+'" data-k="tm" onchange="saveMindDEl(this)"/></div>';
  }else if(mS==="W"){
    [{k:"wins",l:"🏆 Wins",p:"Teen achhi cheezein..."},{k:"mis",l:"❌ Mistake",p:"Kya galat hua..."},{k:"imp",l:"📈 Improve",p:"Aage kya different..."}].forEach(function(f){
      o+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px">'+f.l+'</div><textarea class="inp" placeholder="'+f.p+'" data-wk="'+wk+'" data-k="'+f.k+'" onchange="saveMindWEl(this)">'+eH(wd[f.k]||"")+'</textarea></div>';
    });
  }else{
    ["📵 Phone 11:15 PM ke baad band","💸 No random spending","🏋️ No gym skip 2 days","📅 Sunday review mandatory"].forEach(function(r,i){
      o+='<div class="card" style="display:flex;gap:12px;align-items:center"><div style="width:28px;height:28px;border-radius:8px;background:var(--gd);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">'+(i+1)+'</div><div style="font-size:13px;font-weight:600">'+r+'</div></div>';
    });
  }
  return o;
}
function togMind(k){var t=tday();if(!DB[t])DB[t]={};DB[t][k]=!DB[t][k];sv();if(DB[t][k])beep("done");render()}
function saveMindD(k,v){var t=tday();if(!DB[t])DB[t]={};DB[t][k]=v;sv()}
function saveMindW(wk,k,v){if(!DB[wk])DB[wk]={};DB[wk][k]=v;sv()}
var BDUR={inhale:4,hold:4,exhale:6},BNXT={inhale:"hold",hold:"exhale",exhale:"inhale"},BCLR={inhale:"var(--bl)",hold:"var(--am)",exhale:"var(--pu)"};
function startBr(){if(brTmr)clearTimeout(brTmr);brOn=true;brPh="inhale";brCnt=4;brCyc=0;tickBr()}
function tickBr(){var ui=document.getElementById("brui");if(!ui||!brOn)return;var dots="";for(var i=0;i<6;i++)dots+='<div style="width:9px;height:9px;border-radius:50%;background:'+(i<brCyc?"var(--pu)":"var(--bg3)")+';display:inline-block;margin:0 2px"></div>';ui.innerHTML='<div style="text-align:center"><div style="font-size:52px;font-weight:800;color:'+BCLR[brPh]+'">'+brCnt+'</div><div style="font-size:13px;color:var(--t3);text-transform:capitalize;margin:5px 0">'+brPh+'</div><div style="margin-bottom:10px">'+dots+'</div><button class="btnx" style="border-radius:18px;padding:7px 20px;font-size:11px" onclick="stopBr()">■ Stop</button></div>';if(brCnt>1){brCnt--;brTmr=setTimeout(tickBr,1000)}else{brTmr=setTimeout(function(){if(brPh==="exhale"){brCyc++;if(brCyc>=6){brOn=false;togMind("br");beep("win");toast("🌬️ Done!","var(--pu)");var u=document.getElementById("brui");if(u)u.innerHTML='<div style="text-align:center"><button class="btn" onclick="startBr()">▶ Again</button></div>';return}}brPh=BNXT[brPh];brCnt=BDUR[brPh];tickBr();},1000)}}
function stopBr(){brOn=false;if(brTmr)clearTimeout(brTmr);var u=document.getElementById("brui");if(u)u.innerHTML='<div style="text-align:center"><button class="btn" onclick="startBr()">▶ Start</button></div>'}

// ── NOTIFICATIONS ────────────────────────────────────
var NSCH=[{time:"06:15",title:"🌅 Rise!",body:"Wake up!"},{time:"06:30",title:"💪 Gym!",body:"Chalte hain!"},{time:"09:30",title:"💻 DSA",body:"45 min practice"},{time:"23:15",title:"📵 Phone",body:"Band karo bhai"},{time:"23:30",title:"😴 Sleep",body:"So jao!"}];
function openNP(){document.getElementById("novl").classList.add("show");renderNP()}
function closeNP(){document.getElementById("novl").classList.remove("show")}
function renderNP(){
  var perm="Notification" in window?Notification.permission:"denied";
  document.getElementById("nsht").innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:14px">🔔 Notifications</div>'+
  '<div style="background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:12px;font-size:12px;color:'+(perm==="granted"?"var(--gr)":perm==="denied"?"var(--rd)":"var(--am)")+'">'+( perm==="granted"?"✅ ON!":perm==="denied"?"❌ Denied":"⚠️ Needed")+'</div>'+
  '<button class="btn" style="width:100%;margin-bottom:10px" onclick="askNotif()">🔔 Enable</button>'+
  '<div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px"><div style="flex:1;font-size:13px;font-weight:600">🔊 Sound</div><div onclick="togSnd()" style="width:44px;height:24px;border-radius:12px;background:'+(sndOn?"var(--gr)":"var(--bg3)")+';border:1px solid var(--bd);cursor:pointer;position:relative"><div style="position:absolute;top:2px;left:'+(sndOn?"22":"2")+'px;width:20px;height:20px;border-radius:50%;background:#fff"></div></div></div>'+
  '<button onclick="closeNP()" style="width:100%;margin-top:8px;padding:10px;background:none;border:1px solid var(--bd);border-radius:10px;color:var(--t3);cursor:pointer;font-family:inherit">Close</button>';
}
function togSnd(){sndOn=!sndOn;DB._snd=sndOn;sv();if(sndOn)beep("done");renderNP()}
function askNotif(){if(!("Notification" in window))return;Notification.requestPermission().then(function(p){if(p==="granted"){beep("win");toast("🔔 ON!")}renderNP()})}

// ── BACKUP ───────────────────────────────────────────
function exportData(){var blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="growth-"+tday()+".json";a.click();URL.revokeObjectURL(url);toast("📤 Exported!")}
function importData(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);Object.assign(DB,d);sv();toast("📥 Imported!");render()}catch(err){toast("Error!","var(--rd)")}};r.readAsText(f)};inp.click()}

// ── INIT ─────────────────────────────────────────────
render();
if("Notification" in window&&Notification.permission==="granted"){
  var now=new Date();
  NSCH.forEach(function(n){
    var p=n.time.split(":");var t2=new Date();t2.setHours(+p[0],+p[1],0,0);
    if(t2<=now)t2.setDate(t2.getDate()+1);
    var delay=t2-now;
    if(delay>0&&delay<86400000)setTimeout(function(ti,tb){if("Notification" in window&&Notification.permission==="granted")new Notification(ti,{body:tb})}.bind(null,n.title,n.body),delay);
  });
}
setInterval(function(){sv()},30000);

</script>
